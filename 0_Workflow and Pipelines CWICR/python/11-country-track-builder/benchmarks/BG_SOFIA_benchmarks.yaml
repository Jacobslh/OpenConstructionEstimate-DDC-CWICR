# BG_SOFIA — total cost in BGN per scenario.
#
# Derived from NSI (Bulgarian Statistical Institute) "Statistical
# yearbook of construction" 2024, Eurostat lci_lci2 (BG ≈ 0.40 of DE),
# and BG-EUR fixed peg of 1.95583. Bulgaria has the lowest construction
# labour cost in the EU; material costs sit closer to 60% of DE due to
# regional supply chains. Sofia carries a ~10% premium over national
# average per NSI regional CCI.

