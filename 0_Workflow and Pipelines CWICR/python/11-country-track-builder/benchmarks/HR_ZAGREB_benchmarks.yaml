# HR_ZAGREB — total cost in EUR per scenario.
#
# Derived from Eurostat HICP construction component (cl_constru_lci),
# DZS (Croatian Bureau of Statistics) construction cost index, and BKI
# Baukosten Germany 2024 reference, scaled by Eurostat labour cost
# index (HR ≈ 0.62 of DE) and material PPP (HR ≈ 0.85 of DE).
# Acceptance window is wide because Croatian commercial-grade pricing
# spans from "post-Yugoslav baseline" to "Zagreb premium build" with
# 2-3× spread; tighten once DZS line-item data lands.

