# Benchmark range template — copy to <TRACK>_benchmarks.yaml.
#
# Per-scenario expected total cost range in the track's currency.
# `min` and `max` define the acceptance window; an estimate outside
# the window FAILS the public-benchmark check in run_functional_suite.py.
#
# Sources by region:
#   AU/NZ:  Rawlinsons Construction Cost Guide
#   US:     RSMeans Building Construction Cost Data
#   UK:     SPON's Architects' and Builders' Price Book
#   EU:     Eurostat construction cost index + national agencies (DZS HR,
#           NSI BG, INS RO, GUS PL, ISTAT IT, CSU CZ, SCB SE)
#   ZA:     StatsSA + AECOM Construction Cost Survey
#   NG:     Federal Ministry of Works construction cost guide + JLL
#   Asia:   Turner & Townsend International Construction Market Survey
#
# Numbers below are PLACEHOLDERS — replace with the real survey ranges
# before promoting any track. The `expected` field is informational only.

