# Australia / Sydney — first target track. English source, no translation.
# Source ENG_TORONTO chosen because both are English-speaking developed
# economies with similar construction-cost structure; cleaner conversion
# than going through US (US has anomalous extra columns).

region: AU_SYDNEY

# Within-country adjustment: Sydney is at the higher end of Australian
# regional cost indexes (Rawlinsons puts Sydney ≈ 1.04 vs national average
# = 1.0). National-average source data converts to Sydney with this factor.
location_factor: 1.04

# Optional: if we later get ABS/Rawlinsons resource-level prices, drop the
# CSV here to override the type-factor result. Commented out for first run.
# overrides_csv: configs/AU_SYDNEY_overrides.csv

# Don't add the US-style metadata columns (cad_to_usd_rate etc.) by default.
add_us_metadata: false

# AU is English; source is also English -> nothing to translate.
translate: false
