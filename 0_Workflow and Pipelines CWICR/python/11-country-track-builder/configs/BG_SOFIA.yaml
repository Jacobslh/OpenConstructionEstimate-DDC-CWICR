# Bulgaria / Sofia — German source (DE_BERLIN), BGN currency.
# BGN is fixed-pegged to EUR at 1.95583 (currency board since 1997), so the
# FX leg is exact and stable. Sofia is the major construction market.

region: BG_SOFIA

# NSI regional cost index puts Sofia at ~1.10 vs national average — capital
# city premium is more pronounced than in older EU members.
location_factor: 1.10

# overrides_csv: configs/BG_SOFIA_overrides.csv      # if/when NSI data lands

add_us_metadata: false

translate: true       # Bulgarian (bg) ≠ German (de)
