# Croatia / Zagreb — German source (DE_BERLIN) chosen because both are
# Eurozone (since Croatia adopted EUR 2023-01-01), share Eurostat HICP
# methodology, and DE has the canonical 93-col schema.

region: HR_ZAGREB

# Zagreb is the most expensive Croatian city; Eurostat regional construction
# cost places it at ~1.05 vs national average. National-avg → Zagreb adjust.
location_factor: 1.05

# overrides_csv: configs/HR_ZAGREB_overrides.csv     # if/when DZS data lands

add_us_metadata: false

translate: true       # Croatian (hr) ≠ German (de)
