# FX snapshot — used by price_pipeline.py for currency conversion.
# Reproducible: re-fetching same snapshot date yields the same numbers.
# Refresh: re-run scripts/refresh_fx_snapshot.py and update snapshot_date.

snapshot_date: "2026-04-24"
fetched_at: "2026-04-27"
sources:
  ecb_live: "https://www.ecb.europa.eu/stats/eurofxref/eurofxref-daily.xml"
  bgn_peg: "Bulgarian National Bank currency board (since 1997-07-05): EUR/BGN = 1.95583 fixed"
  aed_peg: "UAE Central Bank: USD/AED = 3.6725 fixed since 1997"
  rub_manual: "IMF mid-rate, sanctioned currency (no ECB feed)"
  vnd_manual: "State Bank of Vietnam reference rate"
  ngn_manual: "Central Bank of Nigeria official rate (post-2023 unification)"

